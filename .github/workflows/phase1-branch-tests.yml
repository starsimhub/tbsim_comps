name: Phase 1 TB tests against tbsim branch

on:
  workflow_dispatch:
    inputs:
      tbsim_branch:
        description: "Branch, tag, or SHA from starsimhub/tbsim"
        required: true
        default: "main"
      tbsim_repo:
        description: "Owner/repo to test (forks supported)"
        required: true
        default: "starsimhub/tbsim"

jobs:
  phase1-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Checkout target tbsim ref
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.tbsim_repo }}
          ref: ${{ inputs.tbsim_branch }}
          path: tbsim-src
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tbsim from selected ref
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./tbsim-src"
          python -m pip install pytest pytest-env pytest-xdist

      - name: Show installed package source
        run: |
          tmpdir="$(mktemp -d)"
          cd "${tmpdir}"
          python - <<'PY'
          import tbsim
          print("Using tbsim from:", tbsim.__file__)
          PY

      - name: Run Phase 1 suite
        env:
          MPLBACKEND: Agg
          SCIRIS_BACKEND: agg
        run: |
          tmpdir="$(mktemp -d)"
          cd "${tmpdir}"
          python -m pytest "${GITHUB_WORKSPACE}/tests/test_tb.py" -v --tb=short
